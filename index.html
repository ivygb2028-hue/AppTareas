<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask - Mi App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="stylesTareas.css">
</head>
<body>

    <div id="auth-section" class="auth-container">
        <div class="auth-tabs">
            <span id="tab-login" class="active" onclick="switchAuth('login')">Entrar</span>
            <span id="tab-signup" onclick="switchAuth('signup')">Registro</span>
        </div>
        <form id="auth-form">
            <input type="email" id="auth-email" placeholder="Correo" required>
            <input type="password" id="auth-password" placeholder="Contraseña" required>
            <button type="submit" id="auth-submit-btn">Entrar</button>
        </form>
        <button class="btn-github" id="github-login">
            <i class="fab fa-github"></i> Entrar con GitHub
        </button>
    </div>

    <div id="app-section" class="hidden">
        <header>
            <h2><i class="fas fa-clipboard-list"></i> Mis Tareas</h2>
            <button class="btn-logout" id="logout-btn">Salir</button>
        </header>

        <div class="container">
            <div class="task-input-card">
                <input type="text" id="task-title" placeholder="Título de la tarea" required>
                <textarea id="task-desc" placeholder="Descripción..."></textarea>
                <div class="date-group">
                    <label>📅 Fecha Límite:</label>
                    <input type="date" id="task-deadline">
                </div>
                <button id="add-task-btn">Añadir Tarea</button>
            </div>

            <div class="search-section">
                <input type="text" id="search-input" placeholder="Buscar tarea...">
                <div class="filters">
                    <button class="active" data-filter="all">Todas</button>
                    <button data-filter="pending">Pendientes</button>
                    <button data-filter="completed">Completadas</button>
                </div>
            </div>

            <div id="tasks-list"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
